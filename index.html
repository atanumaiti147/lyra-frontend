<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyra Music — Discord Music Bot</title>
    <meta name="description" content="Lyra Music — a high quality, always-on Discord music bot with filters, playlists, and live ticket support." />
    <link rel="icon" href="/images/avatar-square.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      /* Inlined so the splash renders instantly, before style.css / React load. */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: linear-gradient(160deg, #fdfbff 0%, #f3ecff 100%);
        transition: opacity .4s ease;
      }
      #splash-screen.splash-hide { opacity: 0; pointer-events: none; }
      #splash-screen img {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        object-fit: cover;
        box-shadow: 0 8px 24px rgba(90, 66, 150, 0.18);
        animation: splash-bounce 1.4s ease-in-out infinite;
      }
      #splash-screen .splash-spinner {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 3.5px solid rgba(107, 90, 148, 0.18);
        border-top-color: #6a4fc0;
        animation: splash-spin .7s linear infinite;
      }
      #splash-screen .splash-text {
        font-family: 'Caveat', cursive;
        font-size: 1.6rem;
        font-weight: 700;
        color: #6a4fc0;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @keyframes splash-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
  </head>
  <body>
    <div id="splash-screen" aria-hidden="true">
      <img src="/images/avatar-square.png" alt="" />
      <span class="splash-text">Lyra Music</span>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
